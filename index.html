    <style>
        /* خێراترین شێوازی بارکردن بۆ ئەوەی ڕەشی نەمێنێت */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000 radial-gradient(circle at 50% -20%, #0088cc44, #000);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #fff; padding: 15px;
            overflow: hidden;
        }

        .main-wrapper {
            width: 100%; max-width: 400px;
            height: 85vh; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 40px 25px;
            text-align: center;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .top-brand-small {
            font-size: 0.75rem;
            font-weight: 800;
            color: #0088cc;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .call-icon-main {
            font-size: 5rem;
            color: #0088cc;
            margin-top: 20px;
            filter: drop-shadow(0 0 25px rgba(0, 136, 204, 0.4));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .instruction {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            margin-top: 15px;
        }

        .scroll-icon {
            font-size: 2rem;
            color: #0088cc;
            margin-top: 10px;
            animation: moveDown 2s infinite ease-in-out;
        }

        @keyframes moveDown {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(10px); opacity: 1; }
        }

        .link-item {
            display: flex; align-items: center;
            padding: 25px 30px;
            background: rgba(0, 136, 204, 0.2);
            border: 1px solid rgba(0, 136, 204, 0.5);
            border-radius: 30px;
            text-decoration: none;
            color: #fff;
            font-weight: 800;
            font-size: 1.3rem;
            transition: 0.2s;
        }

        .link-item:active { transform: scale(0.96); background: rgba(0, 136, 204, 0.4); }

        .link-item i { font-size: 2.5rem; margin-left: 20px; color: #0088cc; }
        .link-item span { flex-grow: 1; text-align: right; }

        .footer-section {
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-brand { font-size: 1rem; font-weight: 800; color: #fff; }
        .footer-slogan { font-size: 0.7rem; color: #aaa; margin-top: 3px; }
    </style>

<body>

    <div class="main-wrapper">
        <div class="top-brand-small">Kurd Agency</div>

        <div class="header">
            <div class="call-icon-main"><i class="fab fa-telegram"></i></div>
            <p class="instruction">بۆ جۆین کردن ئێرە دابگرە</p>
            <div class="scroll-icon"><i class="fas fa-chevron-down"></i></div>
        </div>

        <div class="links-list">
            <a href="https://t.me/sult4n90_account" class="link-item" onclick="ttq.track('CompletePayment');">
                <i class="fab fa-telegram"></i> <span>تێلگرام</span>
            </a>
        </div>

        <div class="footer-section">
            <div class="footer-brand">KURD AGENCY</div>
            <p class="footer-slogan">گەورەکردنی کارەکەت لەگەڵ ئێمە ئاسانە</p>
        </div>
    </div>

</body>
